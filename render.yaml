databases:
  - name: cocktail-db
    plan: free
    databaseName: cocktail_app
    user: cocktail_user

services:
  - type: web
    name: cocktail-app
    runtime: node
    plan: starter
    buildCommand: npm run build
    startCommand: npm start
    preDeployCommand: npx --prefix server prisma migrate deploy --schema server/prisma/schema.prisma
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cocktail-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: UPLOADS_PATH
        value: /var/data/uploads
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
    disk:
      name: uploads
      mountPath: /var/data/uploads
      sizeGB: 1
